<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Personality Analyzer</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
</head>
<body>

<div class="popup-overlay hidden" id="popup-overlay">
  <div class="popup-box">
    <div class="popup-icon">🎉</div>
    <h2 class="popup-title">Congratulations dude,</h2>
    <p class="popup-msg">It actually analyzes your personality.</p>
    <button class="btn btn-primary popup-close-btn" onclick="closePopup()">
      <span>OK, Show Me!</span>
      <span class="btn-icon">👇</span>
    </button>
  </div>
</div>

<div class="bg-orbs">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
</div>

<div class="container">

<!-- PAGE 1 -->
<div class="card" id="page-1">
  <div class="card-header">
    <div class="badge">✦ AI Powered</div>
    <h1>AI Personality <span class="gradient-text">Analyzer</span></h1>
    <p class="subtitle">Let's start with your info</p>
  </div>

  <div class="form-group">
    <label>Your Name</label>
    <input type="text" id="name" />
  </div>

  <div class="form-group">
    <label>Personality Type</label>
    <select id="personality">
      <option value="">Select</option>
      <option>Overthinker</option>
      <option>Overthinker Pro Max</option>
    </select>
  </div>

  <div class="form-group">
    <label>Strengths</label>
    <textarea id="strengths"></textarea>
  </div>

  <!-- NEW WEAKNESS -->
  <div class="form-group">
    <label>Your Weakness 😏</label>
    <div class="radio-group">
      <label><input type="radio" name="weakness" value="Falls for mask girl 😷"> Fall for mask girl</label>
      <label><input type="radio" name="weakness" value="Falls for cute voice girl 🎙️"> Cute voice girl</label>
      <label><input type="radio" name="weakness" value="Falls for senior girl 🎓"> Senior girl</label>
      <label><input type="radio" name="weakness" value="Afraid to approach 😶"> Afraid to approach</label>
      <label><input type="radio" name="weakness" value="Afraid to approach 😶"> Other </label>
        <div>
          <label>e.g.</label>
          <input type="text" id="e.g." />
        </div>
    </div>
  </div>

  <button class="btn btn-primary" onclick="startAnalysis()">Analyze Personality</button>
</div>

<!-- PAGE 2 -->
<div class="card hidden" id="page-2">

<div id="loading-state">
  <h2>Analyzing...</h2>
</div>

<div id="result-state" class="hidden">

  <h2 id="result-name"></h2>
  <span id="result-personality"></span>

  <h3>Strengths</h3>
  <ul id="strengths-list"></ul>

  <h3>Weakness</h3>
  <ul id="weakness-list"></ul>

  <button onclick="showReport()">Generate Report</button>

</div>
</div>

<!-- PAGE 3 -->
<div class="card hidden" id="page-3">
  <h2>This report confirms you are officially fooled 😄</h2>
</div>

</div>

<footer class="prank-footer hidden" id="prank-footer">
  <img src="april-fool.png" class="footer-img" />
</footer>

<script src="script.js"></script>
</body>
</html>
